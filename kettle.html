<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KETTLE Catalog</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #fff; }
.topbar {
    position: fixed; top: 0; width: 100%; background: #f6c1c1;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; box-sizing: border-box; z-index: 999;
}
.topbar a {
    text-decoration: none; color: #222; font-weight: bold;
    background: rgba(255,255,255,0.9); padding: 8px 14px; border-radius: 8px;
}
.title { font-weight: bold; font-size: 18px; color: #222; }
.container { margin-top: 80px; padding: 0 10px; text-align: center; }
img {
    width: 100%; max-width: 1100px; display: block; margin: 8px auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.status { color: #666; font-size: 15px; margin: 15px 0; }
.download-btn {
    display: inline-block; background: #27ae60; color: white;
    padding: 14px 40px; border-radius: 10px; text-decoration: none;
    font-weight: bold; font-size: 17px; margin: 20px 0;
}
.note { color: #555; font-size: 14px; max-width: 600px; margin: 0 auto 30px; }
</style>
</head>
<body>
<div class="topbar">
    <a href="index.html">← Back</a>
    <div class="title">KETTLE</div>
    <a href="HONGYI_KETTLE.pdf" download>Download PDF</a>
</div>

<div class="container">
    <h2 style="color:#333; margin-bottom:5px;">KETTLE Product Catalog</h2>
    <p class="status" id="status">Loading product images... (please wait)</p>
    
    <div id="image-container"></div>
    
    <a href="HONGYI_KETTLE.pdf" download class="download-btn">⬇ Download Full PDF Catalog</a>
    
    <p class="note">
        If images do not appear after 30 seconds, please use the Download PDF button above.<br>
        For best experience, view on desktop or Wi-Fi.
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('image-container');
    const status = document.getElementById('status');
    let loadedCount = 0;
    const total = 200;

    for (let i = 1; i <= total; i++) {
        const num = String(i).padStart(2, '0');
        const img = document.createElement('img');
        img.src = 'kettle/' + num + '.jpg';
        img.alt = 'Kettle ' + num;
        img.loading = 'lazy';

        img.onerror = function() {
            if (this.src.endsWith('.jpg')) {
                this.src = 'kettle/' + num + '.jpeg';
            } else {
                this.style.display = 'none';
            }
        };

        img.onload = function() {
            loadedCount++;
            if (loadedCount === 1) {
                status.textContent = 'Showing product images...';
            }
        };

        container.appendChild(img);
    }

    // If nothing loads after 8 seconds, show helpful message
    setTimeout(function() {
        if (loadedCount === 0) {
            status.innerHTML = 'Images not loading. Please use the <strong>Download PDF</strong> button above.';
        }
    }, 8000);
});
</script>
</body>
</html>
