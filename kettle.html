<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KETTLE Catalog</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #fff; }
.topbar {
    position: fixed; top: 0; width: 100%; background: #f6c1c1;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; box-sizing: border-box; z-index: 999;
}
.topbar a, .topbar button {
    text-decoration: none; color: #222; font-weight: bold;
    background: rgba(255,255,255,0.9); padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer;
}
.logo { height: 42px; max-width: 160px; object-fit: contain; }
.container { margin-top: 80px; padding: 0 10px; text-align: center; }
img { width: 100%; max-width: 1100px; display: block; margin: 8px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.status { color: #666; font-size: 15px; margin: 15px 0; }

/* 下载弹窗样式 */
.modal {
    display: none; position: fixed; z-index: 1000; left: 0; top: 0;
    width: 100%; height: 100%; background: rgba(0,0,0,0.5);
}
.modal-content {
    background: white; margin: 15% auto; padding: 25px; border-radius: 12px;
    width: 90%; max-width: 320px; text-align: center;
}
.modal-content h3 { margin-top: 0; }
.modal-content a {
    display: block; margin: 12px 0; padding: 12px; background: #f0f0f0;
    text-decoration: none; color: #222; border-radius: 8px; font-weight: bold;
}
.modal-content a:hover { background: #e0e0e0; }
.close { float: right; font-size: 22px; cursor: pointer; }
</style>
</head>
<body>
<div class="topbar">
    <a href="index.html">← Back</a>
    <img src="logo.png" alt="HONGYI Logo" class="logo">
    
    <!-- 点击弹出下载列表 -->
    <button onclick="showDownloadModal()">Download PDF</button>
</div>

<div class="container">
    <h2 style="color:#333; margin-bottom:5px;">KETTLE Product Catalog</h2>
    <p class="status" id="status">Loading product images... (please wait)</p>
    <div id="image-container"></div>
</div>

<!-- 下载弹窗 -->
<div id="downloadModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="hideDownloadModal()">&times;</span>
        <h3>Choose Version to Download</h3>
        
        <a href="HONGYI_KETTLE.pdf" download>HONGYI_KETTLE.pdf (Latest Full Catalog)</a>
        <a href="KETTLE_2026_NEW_ITEM.pdf" download>KETTLE_2026_NEW_ITEM.pdf (New Items 2026)</a>
        
        <p style="font-size:13px; color:#666; margin-top:15px;">
            More versions will be added when updated.
        </p>
    </div>
</div>

<script>
function showDownloadModal() {
    document.getElementById('downloadModal').style.display = 'block';
}
function hideDownloadModal() {
    document.getElementById('downloadModal').style.display = 'none';
}

// 图片加载逻辑
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('image-container');
    const status = document.getElementById('status');
    let loadedCount = 0;
    const total = 200;

    for (let i = 1; i <= total; i++) {
        const num = String(i).padStart(2, '0');
        const img = document.createElement('img');
        img.src = 'kettle/' + num + '.jpg';
        img.alt = 'Kettle ' + num;
        img.loading = 'lazy';

        img.onerror = function() {
            if (this.src.endsWith('.jpg')) {
                this.src = 'kettle/' + num + '.jpeg';
            } else {
                this.style.display = 'none';
            }
        };

        img.onload = function() {
            loadedCount++;
            if (loadedCount === 1) status.textContent = 'Showing product images...';
        };

        container.appendChild(img);
    }

    setTimeout(function() {
        if (loadedCount === 0) {
            status.innerHTML = 'Images not loading. Please use Download PDF button.';
        }
    }, 8000);
});
</script>
</body>
</html>
